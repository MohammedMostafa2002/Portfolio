<section class="hero section" id="hero" aria-label="Introduction">

      </div>

      <p class="hero-description">

        building scalable RESTful APIs and AI-integrated systems. Currently
        deepening expertise at
        <strong>ITI's Full Stack .NET &amp; Generative AI Track</strong>.
      </p>

      <div class="hero-actions">
        <a href="#projects" class="btn btn-primary">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <path
              d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"
            />

        </a>
        <a href="#contact" class="btn btn-ghost">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <path

            />
            <polyline points="22,6 12,13 2,6" />

          Get In Touch
        </a>

      <div class="hero-socials">
        <a
          href="https://linkedin.com/in/mohamed-hassan-mm"

            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"

          </svg>

        </a>
        <span class="sep" aria-hidden="true"></span>
        <a
          href="https://github.com/Mohamed-Hassan-M-M"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="GitHub Profile"

            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"

            height="16"

    <!-- Visual: Profile Photo with Geometric Frame -->
    <div class="hero-visual" aria-hidden="true">
      <div class="profile-frame-container">
        <canvas class="profile-particle-canvas" aria-hidden="true"></canvas>

        <!-- Floating particles -->
        <div class="profile-particles">
          <span class="particle"></span>
          <span class="particle"></span>
          <span class="particle"></span>
          <span class="particle"></span>
          <span class="particle"></span>
          <span class="particle"></span>
          <span class="particle"></span>
          <span class="particle"></span>
        </div>

        <!-- Glow halo -->
        <div class="profile-glow"></div>

        <!-- Geometric fragments (parallax layers) -->
        <div class="profile-geo-frags">
          <div class="frag frag--hex"></div>
          <div class="frag frag--tri"></div>
          <div class="frag frag--circle"></div>
          <div class="frag frag--diamond"></div>
        </div>

        <!-- Outer pulsating hexagonal ring -->
        <div class="profile-hex-outer"></div>

        <!-- Animated waveform bars -->
        <div class="profile-waveform">
          <span class="wave-bar"></span>
          <span class="wave-bar"></span>
          <span class="wave-bar"></span>
          <span class="wave-bar"></span>
          <span class="wave-bar"></span>
          <span class="wave-bar"></span>
          <span class="wave-bar"></span>
          <span class="wave-bar"></span>
          <span class="wave-bar"></span>
          <span class="wave-bar"></span>
          <span class="wave-bar"></span>
          <span class="wave-bar"></span>
        </div>

        <!-- Inner hexagonal photo -->
        <div class="profile-hex-inner">
          <img
            src="assets/profile.webp"
            alt="Mohamed Hassan — Full Stack .NET Developer"
            width="280"
            height="280"
            loading="eager"
          />
        </div>
      </div>
    </div>
  </div>

  <!-- Scroll indicator -->
  <div class="scroll-indicator" aria-hidden="true">
    <span>scroll</span>
    <div class="scroll-indicator-line"></div>
  </div>
</section>

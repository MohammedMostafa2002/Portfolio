    />
  </head>
  <body>
    <!-- Global SVG clip-path (referenced by profile hex frame) -->
    <svg
      class="profile-svg-defs"
      width="0"
      height="0"
      aria-hidden="true"
      focusable="false"
    >
      <defs>
        <clipPath id="profile-hex-clip" clipPathUnits="objectBoundingBox">
          <polygon points="0.5,0 1,0.25 1,0.75 0.5,1 0,0.75 0,0.25" />
        </clipPath>
      </defs>
    </svg>

    <!-- Skip to main content (a11y) -->
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <!-- Top Navigation -->
    <div id="nav-root"></div>

    <!-- Main Content -->
    <main id="main-content">
      <div id="hero-root"></div>
      <div id="about-root"></div>
      <div id="skills-root"></div>
      <div id="projects-root"></div>
      <div id="contact-root"></div>
    </main>

    <footer class="site-footer" role="contentinfo">
      <p>
        Designed & Built by <span class="accent">Mohamed Hassan</span> ·
        <span id="footer-year"></span>
      </p>
    </footer>

    <!-- Scripts -->
    <script type="module" src="js/main.js"></script>
  </body>
